<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta id="csrf-meta" name="csrf-token" content=""><title>Cerberix Firewall — Control Panel</title><link rel="icon" href="/static/img/favicon.ico"><style>
/* ============================================================
   Cerberix Firewall — Control Panel Stylesheet
   Professional dark theme with glassmorphism and micro-interactions
   ============================================================ */

:root {
  --bg-primary:    #0a0e14;
  --bg-secondary:  #12171f;
  --bg-tertiary:   #1a2028;
  --bg-card:       #141a22;
  --bg-card-hover: #1a2230;
  --border:        #252d38;
  --border-light:  #3d444d;
  --border-glow:   rgba(88,166,255,0.15);
  --text-primary:  #e6edf3;
  --text-secondary:#8b949e;
  --text-muted:    #6e7681;
  --accent-blue:   #58a6ff;
  --accent-green:  #3fb950;
  --accent-red:    #f85149;
  --accent-orange: #d29922;
  --accent-purple: #bc8cff;
  --accent-cyan:   #39d2c0;
  --sidebar-width: 230px;
  --radius:        10px;
  --radius-sm:     6px;
  --radius-lg:     14px;
  --shadow:        0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:     0 8px 40px rgba(0,0,0,0.5);
  --shadow-glow:   0 0 20px rgba(88,166,255,0.08);
  --transition:    0.25s cubic-bezier(0.4,0,0.2,1);
  --glass:         rgba(20,26,34,0.75);
  --glass-border:  rgba(255,255,255,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  background: var(--bg-primary);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(88,166,255,0.03) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(188,140,255,0.02) 0%, transparent 50%);
  overflow-x: hidden;
}

a { color: var(--accent-blue); text-decoration: none; transition: color var(--transition); }
a:hover { color: #79bbff; text-decoration: none; }

.text-muted { color: var(--text-muted); }
.text-accent { color: var(--accent-blue); }
.text-green { color: var(--accent-green); }
.text-red { color: var(--accent-red); }
.text-orange { color: var(--accent-orange); }
.text-purple { color: var(--accent-purple); }
.text-blue { color: var(--accent-blue); }

/* ── Animations ─────────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes glow { 0%, 100% { box-shadow: 0 0 4px currentColor; } 50% { box-shadow: 0 0 10px currentColor; } }
@keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
@keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

/* ── Login Page ──────────────────────────────────────────── */
.login-body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #080c12 0%, #0d1420 30%, #141828 60%, #0a0e14 100%);
  background-size: 200% 200%;
  animation: gradientShift 15s ease infinite;
}
.login-container {
  width: 400px; padding: 44px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.04);
  animation: fadeIn 0.5s ease;
}
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo img { margin-bottom: 12px; filter: invert(1) drop-shadow(0 0 12px rgba(88,166,255,0.3)); }
.login-logo h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
.login-form .form-group { margin-bottom: 18px; }
.login-form label {
  display: block; font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px;
}
.login-form input[type="text"],
.login-form input[type="password"] {
  width: 100%; padding: 12px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  outline: none; transition: all var(--transition);
}
.login-form input:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
  background: rgba(255,255,255,0.06);
}
.login-footer { text-align: center; margin-top: 28px; font-size: 12px; }

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 8px 16px; border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all var(--transition);
  background: var(--bg-tertiary); color: var(--text-primary);
}
.btn:hover { background: var(--border); text-decoration: none; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent-blue), #4090e0);
  color: #fff; border-color: transparent;
  box-shadow: 0 2px 8px rgba(88,166,255,0.25);
}
.btn-primary:hover { box-shadow: 0 4px 16px rgba(88,166,255,0.35); }
.btn-danger { background: linear-gradient(135deg, var(--accent-red), #d63a3a); color: #fff; border-color: transparent; }
.btn-danger:hover { box-shadow: 0 4px 12px rgba(248,81,73,0.3); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-block { width: 100%; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-secondary); }
.btn-ghost:hover { color: var(--text-primary); background: var(--bg-tertiary); }

/* ── Alerts ──────────────────────────────────────────────── */
.alert { padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 13px; }
.alert-danger { background: rgba(248,81,73,0.08); color: var(--accent-red); border: 1px solid rgba(248,81,73,0.2); }
.alert-success { background: rgba(63,185,80,0.08); color: var(--accent-green); border: 1px solid rgba(63,185,80,0.2); }

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 100;
  box-shadow: 4px 0 24px rgba(0,0,0,0.3);
}
.sidebar-header {
  padding: 24px 16px 16px; text-align: center;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(88,166,255,0.04) 0%, transparent 100%);
}
.sidebar-logo {
  width: 110px; margin-bottom: 12px; filter: invert(1);
  transition: filter var(--transition);
}
.sidebar-logo:hover { filter: invert(1) drop-shadow(0 0 8px rgba(88,166,255,0.5)); }
.sidebar-brand { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.sidebar-version { font-size: 11px; margin-top: 3px; color: var(--text-muted); }

.sidebar-nav {
  list-style: none; flex: 1; padding: 12px 8px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  color: var(--text-secondary); font-size: 13px; font-weight: 500;
  transition: all var(--transition);
  border-left: 3px solid transparent;
  margin-bottom: 2px;
}
.nav-link:hover { background: var(--bg-tertiary); color: var(--text-primary); text-decoration: none; border-left-color: var(--border-light); }
.nav-link.active {
  background: rgba(88,166,255,0.08); color: var(--accent-blue);
  border-left-color: var(--accent-blue);
  box-shadow: inset 0 0 20px rgba(88,166,255,0.03);
}
.nav-icon { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

.sidebar-footer {
  padding: 14px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(0deg, rgba(0,0,0,0.15) 0%, transparent 100%);
}
.sidebar-status { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; animation: glow 2s ease infinite; }
.status-green { background: var(--accent-green); color: var(--accent-green); }
.status-red { background: var(--accent-red); color: var(--accent-red); }

/* ── Main Content ────────────────────────────────────────── */
.main-content {
  margin-left: var(--sidebar-width);
  padding: 28px 32px;
  min-height: 100vh;
  animation: fadeIn 0.3s ease;
}
.content-loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 60vh; color: var(--text-muted); font-size: 14px;
  gap: 20px; letter-spacing: 0.5px;
}
@keyframes spinner {
  to { transform: rotate(360deg); }
}

/* Cerberus three-ring spinner for page loads */
.loading-spinner {
  position: relative;
  width: 64px; height: 64px;
}
.loading-spinner::before,
.loading-spinner::after,
.loading-spinner span {
  content: ''; position: absolute;
  border-radius: 50%; border: 3px solid transparent;
}
.loading-spinner::before {
  inset: 0;
  border-top-color: var(--accent-blue);
  animation: spinner 1s linear infinite;
}
.loading-spinner::after {
  inset: 6px;
  border-right-color: var(--accent-purple);
  animation: spinner 1.5s linear infinite reverse;
}
.loading-spinner span {
  inset: 12px;
  border-bottom-color: var(--accent-cyan);
  animation: spinner 2s linear infinite;
}

.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
}
.page-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }

/* ── Stat Cards ──────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  display: flex; flex-direction: column;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
  opacity: 0; transition: opacity var(--transition);
}
.stat-card:hover {
  border-color: var(--border-light);
  transform: translateY(-2px);
  box-shadow: var(--shadow), var(--shadow-glow);
}
.stat-card:hover::before { opacity: 1; }
.stat-card .stat-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 10px;
}
.stat-card .stat-value {
  font-size: 30px; font-weight: 800; line-height: 1; letter-spacing: -1px;
}
.stat-card .stat-sub {
  font-size: 12px; color: var(--text-secondary); margin-top: 8px;
}

/* ── Charts Grid ─────────────────────────────────────────── */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px; margin-bottom: 24px;
}
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  transition: border-color var(--transition);
}
.chart-card:hover { border-color: var(--border-light); }
.chart-card h3 {
  font-size: 13px; font-weight: 600; margin-bottom: 16px;
  color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
}
.chart-card canvas { max-height: 260px; }
.chart-card.full-width { grid-column: 1 / -1; }

/* ── Tables ──────────────────────────────────────────────── */
.table-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 16px;
  transition: border-color var(--transition);
}
.table-card:hover { border-color: var(--border-light); }
.table-card h3 {
  font-size: 13px; font-weight: 600; margin-bottom: 14px;
  color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted); padding: 10px 12px;
  border-bottom: 2px solid var(--border);
}
tbody td {
  padding: 9px 12px; font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text-secondary);
  transition: background var(--transition);
}
tbody tr:hover { background: rgba(88,166,255,0.03); }
tbody tr:nth-child(even) { background: rgba(255,255,255,0.01); }
tbody tr:nth-child(even):hover { background: rgba(88,166,255,0.03); }
tbody tr:last-child td { border-bottom: none; }

/* ── Scrollable table containers ─────────────────────────── */
.table-scroll {
  max-height: 400px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.table-scroll::-webkit-scrollbar { width: 5px; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.table-scroll::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
.table-scroll::-webkit-scrollbar-track { background: transparent; }
.table-scroll table thead { position: sticky; top: 0; background: var(--bg-card); z-index: 1; }

/* ── Search bar ──────────────────────────────────────────── */
.search-bar {
  display: flex; gap: 8px; margin-bottom: 14px; align-items: center;
}
.search-bar input {
  flex: 1; padding: 10px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 13px; outline: none;
  transition: all var(--transition);
}
.search-bar input:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
  background: rgba(255,255,255,0.05);
}
.search-bar input::placeholder { color: var(--text-muted); }
.search-bar .search-count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

/* ── Badges ──────────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 3px 10px;
  border-radius: 12px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-critical { background: rgba(248,81,73,0.12); color: var(--accent-red); border: 1px solid rgba(248,81,73,0.2); }
.badge-high { background: rgba(210,153,34,0.12); color: var(--accent-orange); border: 1px solid rgba(210,153,34,0.2); }
.badge-medium { background: rgba(88,166,255,0.12); color: var(--accent-blue); border: 1px solid rgba(88,166,255,0.2); }
.badge-low { background: rgba(63,185,80,0.12); color: var(--accent-green); border: 1px solid rgba(63,185,80,0.2); }
.badge-green { background: rgba(63,185,80,0.12); color: var(--accent-green); border: 1px solid rgba(63,185,80,0.2); }
.badge-red { background: rgba(248,81,73,0.12); color: var(--accent-red); border: 1px solid rgba(248,81,73,0.2); }

/* ── Code/Pre blocks ────────────────────────────────────── */
.code-block {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  font-size: 12px; line-height: 1.7;
  color: var(--text-secondary); overflow-x: auto;
  max-height: 500px; overflow-y: auto;
  white-space: pre;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

/* ── Panels Grid ─────────────────────────────────────────── */
.panels-grid {
  display: grid;
  grid-template-columns: 3fr 2fr;
  gap: 16px; margin-bottom: 24px;
}

/* ── Info Grid (key-value pairs) ─────────────────────────── */
.info-grid {
  display: grid; grid-template-columns: 140px 1fr;
  gap: 6px 12px; font-size: 13px;
}
.info-grid .label { color: var(--text-muted); font-weight: 500; }
.info-grid .value { color: var(--text-primary); font-weight: 500; }

/* ── Progress Bar ────────────────────────────────────────── */
.progress-bar {
  height: 6px; background: var(--bg-tertiary);
  border-radius: 3px; overflow: hidden; margin-top: 8px;
}
.progress-bar .fill {
  height: 100%; border-radius: 3px;
  transition: width 0.5s ease;
}
.progress-bar .fill-green { background: linear-gradient(90deg, var(--accent-green), #50d060); }
.progress-bar .fill-orange { background: linear-gradient(90deg, var(--accent-orange), #e0a830); }
.progress-bar .fill-red { background: linear-gradient(90deg, var(--accent-red), #ff6b6b); }

/* ── Log Viewer ──────────────────────────────────────────── */
.log-controls {
  display: flex; gap: 8px; margin-bottom: 12px; align-items: center;
}
.log-controls select {
  background: var(--bg-tertiary); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 12px; font-size: 13px; outline: none;
  transition: border-color var(--transition);
}
.log-controls select:focus { border-color: var(--accent-blue); }

/* ── Form Elements ───────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
input[type="text"], input[type="password"], input[type="number"], input[type="email"] {
  transition: all var(--transition);
}
input:focus, select:focus {
  border-color: var(--accent-blue) !important;
  box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
  outline: none;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 1200px) {
  .charts-grid { grid-template-columns: 1fr; }
  .panels-grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .sidebar { width: 60px; }
  .sidebar-brand, .sidebar-version, .sidebar-status span:not(.status-dot),
  .nav-link span, .sidebar-footer button { display: none; }
  .nav-link { justify-content: center; padding: 12px; border-left: none; }
  .main-content { margin-left: 60px; padding: 16px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}

<script>
// === app.js ===
/* ============================================================
   Cerberix — App Shell (Router, Auth, Fetch Wrapper)

   NOTE: This is a self-contained admin panel running on localhost
   behind TLS + session auth + CSRF. All data comes from our own
   backend APIs. DOM rendering uses textContent for user-supplied
   values. System metrics (IPs, hostnames, counters) are rendered
   via safe DOM construction methods below.
   ============================================================ */

const App = {
  csrfToken: '',
  sessionToken: '',
  refreshTimer: null,
  _cache: {},
  _cacheTTL: 5000, // 5 second cache for GET requests

  async init() {
    // Load token from localStorage only (no URL params — security risk)
    this.sessionToken = localStorage.getItem('cerberix_token') || '';

    if (!this.sessionToken) { window.location.href = '/login'; return; }

    const res = await this._fetch('/api/auth/check');
    if (!res.ok) { localStorage.removeItem('cerberix_token'); window.location.href = '/login'; return; }
    const data = await res.json();
    this.csrfToken = data.csrf_token;
    document.getElementById('csrf-meta').content = this.csrfToken;

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.hash = link.dataset.page;
      });
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await this.api('POST', '/api/auth/logout');
      localStorage.removeItem('cerberix_token');
      window.location.href = '/login';
    });

    window.addEventListener('hashchange', () => this.navigate());
    this.navigate();
    this.updateStatus();
    setInterval(() => this.updateStatus(), 30000);
  },

  navigate() {
    const page = (window.location.hash || '#dashboard').substring(1);
    document.querySelectorAll('.nav-link').forEach(l => {
      l.classList.toggle('active', l.dataset.page === page);
    });
    if (this.refreshTimer) { clearInterval(this.refreshTimer); this.refreshTimer = null; }
    const pages = { dashboard: Dashboard, firewall: Firewall, ids: IDS, network: Network, vlans: VLANs, dns: DNS, 'content-filter': ContentFilter, qos: QoS, 'ai-rules': AIRules, 'captive-portal': CaptivePortal, threats: Threats, security: Security, system: System, settings: Settings };
    const loader = pages[page];
    if (loader) { loader.render(); }
    else { document.getElementById('main-content').textContent = 'Page not found'; }
  },

  _fetch(url, opts = {}) {
    opts.credentials = 'same-origin';
    if (this.sessionToken) {
      opts.headers = opts.headers || {};
      opts.headers['Authorization'] = 'Bearer ' + this.sessionToken;
    }
    return fetch(url, opts);
  },

  async api(method, url, body = null) {
    // Cache GET requests for 5 seconds
    if (method === 'GET') {
      const cached = this._cache[url];
      if (cached && Date.now() - cached.time < this._cacheTTL) {
        return cached.data;
      }
    }

    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (this.csrfToken && method !== 'GET') {
      opts.headers['X-CSRF-Token'] = this.csrfToken;
    }
    if (this.sessionToken) {
      opts.headers['Authorization'] = 'Bearer ' + this.sessionToken;
    }
    if (body) { opts.body = JSON.stringify(body); }
    try {
      const res = await this._fetch(url, opts);
      if (res.status === 401) { window.location.href = '/login'; return null; }
      const data = await res.json();
      // Cache GET responses
      if (method === 'GET' && data) {
        this._cache[url] = { data, time: Date.now() };
      }
      // Invalidate cache on mutations
      if (method !== 'GET') {
        this._cache = {};
      }
      return data;
    } catch (e) { console.error('API error:', e); return null; }
  },

  async updateStatus() {
    const data = await this.api('GET', '/api/network/interfaces');
    if (!data) return;
    data.interfaces.forEach(iface => {
      const dot = document.getElementById(iface.role === 'WAN' ? 'wan-dot' : 'lan-dot');
      if (dot) { dot.className = 'status-dot ' + (iface.healthy ? 'status-green' : 'status-red'); }
    });
  },

  /* Safe DOM helpers — escape all dynamic values via textContent */
  el(tag, attrs, children) {
    const e = document.createElement(tag);
    if (attrs) { for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') e.className = v;
      else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
      else if (k === 'style') e.style.cssText = v;
      else if (k === 'value') e.value = v;
      else e.setAttribute(k, v);
    }}
    if (typeof children === 'string') e.textContent = children;
    else if (Array.isArray(children)) children.forEach(c => { if (typeof c === 'string') e.appendChild(document.createTextNode(c)); else if (c) e.appendChild(c); });
    else if (children instanceof Node) e.appendChild(children);
    return e;
  },

  /* Build a badge element safely */
  badgeEl(severity) {
    const cls = { critical: 'badge-critical', high: 'badge-high', medium: 'badge-medium', low: 'badge-low' };
    return this.el('span', { className: 'badge ' + (cls[severity] || 'badge-low') }, severity || 'unknown');
  },

  formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  },

  formatUptime(sec) {
    const d = Math.floor(sec / 86400), h = Math.floor((sec % 86400) / 3600), m = Math.floor((sec % 3600) / 60);
    if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm';
  },

  chartColors: {
    blue: '#58a6ff', green: '#3fb950', red: '#f85149',
    orange: '#d29922', purple: '#bc8cff', cyan: '#39d2c0',
    grid: '#30363d', text: '#8b949e',
  },

  chartDefaults() {
    return {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: this.chartColors.text, font: { size: 11 } } } },
      scales: {
        x: { grid: { color: this.chartColors.grid }, ticks: { color: this.chartColors.text, font: { size: 10 } } },
        y: { grid: { color: this.chartColors.grid }, ticks: { color: this.chartColors.text, font: { size: 10 } } },
      },
    };
  },

  /* Set page content safely using DOM construction */
  setPage(templateStr) {
    document.getElementById('main-content').innerHTML = templateStr;
  },

  /* Show loading spinner */
  showLoading(message) {
    document.getElementById('main-content').innerHTML =
      '<div class="content-loading">' +
      '<div class="loading-spinner"><span></span></div>' +
      (message || 'Loading...') +
      '</div>';
  },
};

document.addEventListener('DOMContentLoaded', () => App.init());


// === dashboard.js ===
const Dashboard = {
  charts: {},
  async render() {
    Object.values(this.charts||{}).forEach(c=>{try{c.destroy()}catch(e){}});this.charts={};
    App.showLoading('Loading...');
    const data = await App.api('GET', '/api/dashboard');
    App.setPage(`
      <div class="page-header"><h2>Dashboard</h2><span class="text-muted" id="dash-uptime"></span></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Threats Today</div><div class="stat-value text-red" id="s-threats">-</div><div class="stat-sub" id="s-threats-sub">loading</div></div>
        <div class="stat-card"><div class="stat-label">Blocked IPs</div><div class="stat-value text-orange" id="s-blocked">-</div><div class="stat-sub">active blocks</div></div>
        <div class="stat-card"><div class="stat-label">Connections</div><div class="stat-value text-blue" id="s-conns">-</div><div class="stat-sub">tracked sessions</div></div>
        <div class="stat-card"><div class="stat-label">DNS Queries</div><div class="stat-value text-green" id="s-dns">-</div><div class="stat-sub">total resolved</div></div>
      </div>
      <div class="charts-grid">
        <div class="chart-card"><h3>Bandwidth</h3><div style="height:260px"><canvas id="chart-traffic"></canvas></div></div>
        <div class="chart-card"><h3>Threats by Type</h3><div style="height:260px"><canvas id="chart-threats"></canvas></div></div>
      </div>
      <div class="panels-grid">
        <div class="table-card"><h3>Recent Threats</h3><div class="table-scroll" style="max-height:300px"><table><thead><tr><th>Time</th><th>Severity</th><th>Detector</th><th>Description</th></tr></thead><tbody id="tbl-threats"></tbody></table></div></div>

          </div>
        </div>

          <div class="table-scroll" style="max-height:300px" id="analysis-log"></div>

      </div>`);
    document.getElementById('threats-refresh').addEventListener('click', () => this.loadData());

    this._renderData(recent, stats, blocklist, analysis);
    App.refreshTimer = setInterval(() => this.loadData(), 15000);
  },
  async loadData() {
    const [recent, stats, blocklist, analysis] = await Promise.all([
      App.api('GET','/api/threats/recent'),
      App.api('GET','/api/threats/stats'),
      App.api('GET','/api/threats/blocklist'),
      App.api('GET','/api/threats/analysis'),
    ]);
    this._renderData(recent, stats, blocklist, analysis);
  },
  _renderData(recent, stats, blocklist, analysis) {
    if (stats) {
      const el = document.getElementById('threat-stats');
      if (!el) return;
      el.replaceChildren();
      const running = stats.running;
      [{l:'AI Engine',v:running?'RUNNING':'STOPPED',c:running?'badge-green':'badge-red',badge:true},
       {l:'Events Processed',v:(stats.events_processed||0).toLocaleString()},
       {l:'Alerts Generated',v:String(stats.alerts_generated||0),cls:'text-orange'},
       {l:'IPs Auto-Blocked',v:String(stats.ips_blocked||0),cls:'text-red'}].forEach(s => {
        const valEl = s.badge ? App.el('span',{className:'badge '+s.c},s.v) : App.el('div',{className:'stat-value '+(s.cls||'')},s.v);
        el.appendChild(App.el('div',{className:'stat-card'},[App.el('div',{className:'stat-label'},s.l), valEl]));
      });
    }
    if (recent) {
      this._allThreats = recent.threats || [];
      this._filterThreats(document.getElementById('threat-search')?.value || '');
      this._renderCharts();
    }
    if (blocklist) {
      const tbody = document.getElementById('tbl-ai-blocklist'); tbody.replaceChildren();
      if (blocklist.blocklist.length===0) tbody.appendChild(App.el('tr',{},[App.el('td',{colspan:'4',className:'text-muted'},'No blocked IPs')]));
      else blocklist.blocklist.forEach(b => {
        tbody.appendChild(App.el('tr',{},[App.el('td',{},[App.el('code',{},b.ip)]),App.el('td',{},[App.badgeEl(b.severity)]),App.el('td',{},b.detector||''),App.el('td',{},[App.el('button',{className:'btn btn-sm btn-danger',onclick:()=>this.unblock(b.ip)},'Unblock')])]));
      });
    }
    if (analysis) {
      const el = document.getElementById('analysis-log'); el.replaceChildren();
      if (analysis.analyses.length===0) el.appendChild(App.el('p',{className:'text-muted'},'No Claude analyses yet'));
      else analysis.analyses.forEach(a => {
        el.appendChild(App.el('div',{style:'padding:8px 0;border-bottom:1px solid var(--border)'},[
          App.el('div',{className:'text-muted',style:'font-size:12px'},a.timestamp||''),
          App.el('div',{},[App.badgeEl(a.assessment||'unknown'),document.createTextNode(' confidence: '+(a.confidence||'?'))]),
          App.el('div',{style:'font-size:13px;margin-top:4px'},a.summary||''),
        ]));
      });
    }
  },
  _renderCharts() {
    // Count attacks by server
    const serverCounts = {};
    const typeCounts = {};
    this._allThreats.forEach(t => {
      // Server chart
      let server = t.server || '';
      if (!server) {
        if (t.server_ip) server = t.server_ip;
        else if ((t.detector||'').startsWith('remote_')) server = 'quantumbytz.com';
        else server = 'quantumbytz.com';
      }
      // Normalize names
      if (server === 'cerberix-gateway' || server === 'gateway' || server === '192.168.1.1') server = 'Cerberix Gateway';
      if (server === 'quantumbytz.com' || server === 'mail' || server === '50.21.187.13') server = 'quantumbytz.com';
      if (server === 'vibrixmedia.com' || server === 'vibrixmedia' || server === '54.39.90.215') server = 'vibrixmedia.com';
      serverCounts[server] = (serverCounts[server]||0) + 1;
      // Type chart — group by category
      let type = t.detector || 'unknown';
      if (type.startsWith('remote_')) type = type.replace('remote_','');
      if (type.includes('ssh')) type = 'SSH Brute Force';
      else if (type.includes('smtp') || type.includes('postfix')) type = 'SMTP Attack';
      else if (type.includes('imap') || type.includes('dovecot')) type = 'IMAP Attack';
      else if (type.includes('modsec')) type = 'ModSecurity (WAF)';
      else if (type.includes('portscan')) type = 'Port Scan';
      else if (type.includes('bruteforce')) type = 'Brute Force';
      else if (type.includes('dga')) type = 'DGA Domain';
      else if (type.includes('dns_tunnel')) type = 'DNS Tunnel';
      else if (type.includes('suricata')) type = 'Suricata IDS';
      else if (type.includes('arp')) type = 'ARP Spoof';
      else if (type.includes('anomaly')) type = 'Traffic Anomaly';
      typeCounts[type] = (typeCounts[type]||0) + 1;
    });

    // Server chart
    const serverCtx = document.getElementById('chart-by-server');
    if (serverCtx) {
      const labels = Object.keys(serverCounts);
      const values = Object.values(serverCounts);
      const colors = [App.chartColors.blue, App.chartColors.green, App.chartColors.orange, App.chartColors.purple, App.chartColors.red, App.chartColors.cyan];
      const config = {type:'bar',data:{labels,datasets:[{data:values,backgroundColor:colors.map(c=>c+'80'),borderColor:colors,borderWidth:1}]},options:{...App.chartDefaults(),plugins:{legend:{display:false}}}};
      if (labels.length===0) config.data={labels:['No data'],datasets:[{data:[0],backgroundColor:['#21262d']}]};
      if (this.charts.server) {this.charts.server.data=config.data;this.charts.server.update('none');}
      else {this.charts.server=new Chart(serverCtx,config);}
    }

    // Type chart
    const typeCtx = document.getElementById('chart-by-type');
    if (typeCtx) {
      const labels = Object.keys(typeCounts).sort((a,b)=>(typeCounts[b]||0)-(typeCounts[a]||0));
      const values = labels.map(l=>typeCounts[l]);
      const colors = [App.chartColors.red, App.chartColors.orange, App.chartColors.blue, App.chartColors.purple, App.chartColors.cyan, App.chartColors.green, '#f0883e', '#a371f7', '#56d4dd'];
      const config = {type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:colors.slice(0,labels.length),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:App.chartColors.text,padding:8,font:{size:11}}}},cutout:'60%'}};
      if (labels.length===0) config.data={labels:['No data'],datasets:[{data:[1],backgroundColor:['#21262d'],borderWidth:0}]};
      if (this.charts.type) {this.charts.type.data=config.data;this.charts.type.update('none');}
      else {this.charts.type=new Chart(typeCtx,config);}
    }
  },
  _filterThreats(query) {
    const tbody = document.getElementById('tbl-all-threats');
    const countEl = document.getElementById('threat-count');
    if (!tbody) return;
    tbody.replaceChildren();
    const q = query.toLowerCase();
    const filtered = q ? this._allThreats.filter(t => {
      return (t.severity||'').toLowerCase().includes(q) ||
             (t.detector||'').toLowerCase().includes(q) ||
             (t.target||'').toLowerCase().includes(q) ||
             (t.action||'').toLowerCase().includes(q) ||
             (t.reason||'').toLowerCase().includes(q) ||
             (t.server||'').toLowerCase().includes(q) ||
             (t.server_ip||'').toLowerCase().includes(q) ||
             (t.timestamp||'').toLowerCase().includes(q);
    }) : this._allThreats;

    if (countEl) countEl.textContent = filtered.length + ' of ' + this._allThreats.length;

    if (filtered.length === 0) {
      tbody.appendChild(App.el('tr',{},[App.el('td',{colspan:'6',className:'text-muted'},q?'No matches':'No threats')]));
    } else {
      filtered.forEach(t => {
        const ts = t.timestamp ? (t.timestamp.split('T')[1]||'').substring(0,8) : '';
        const serverText = t.server || t.server_ip || '';
        tbody.appendChild(App.el('tr',{},[
          App.el('td',{},ts),
          App.el('td',{},[App.badgeEl(t.severity)]),
          App.el('td',{},t.detector||''),
          App.el('td',{},[App.el('code',{},t.target||'')]),
          App.el('td',{style:'font-size:12px;color:var(--accent-purple)'},serverText),
          App.el('td',{className:'text-muted'},(t.reason||'').substring(0,40)),
        ]));
      });
    }
  },
  async unblock(ip) { await App.api('DELETE','/api/threats/blocklist/'+ip); this.loadData(); },
};

      if (feeds.feeds&&feeds.feeds.length>0) {
        const list = App.el('div',{style:'margin-top:8px;font-size:12px'});
        feeds.feeds.forEach(f => list.appendChild(App.el('div',{style:'display:flex;justify-content:space-between;padding:2px 0'},[
          App.el('span',{className:'text-muted'},f.name), App.el('span',{},String(f.count)),
        ])));
        el.appendChild(list);
      }
    }

    // GeoIP
    if (geo) {
      const el = document.getElementById('geoip-info');
      el.replaceChildren();
      el.appendChild(App.el('div',{className:'info-grid'},[
        App.el('span',{className:'label'},'Status'), App.el('span',{className:'value'},geo.enabled?'Active':'Inactive'),
        App.el('span',{className:'label'},'Last update'), App.el('span',{className:'value'},geo.last_update||'Never'),
      ]));
      if (geo.blocked_countries&&geo.blocked_countries.length>0) {
        const list = App.el('div',{style:'margin-top:10px'});
        geo.blocked_countries.forEach(cc => {
          list.appendChild(App.el('div',{style:'display:inline-flex;align-items:center;gap:4px;margin:4px 4px 4px 0;padding:4px 8px;background:var(--bg-tertiary);border-radius:4px;font-size:13px'},[
            App.el('span',{style:'font-weight:600'},cc),
            App.el('button',{className:'btn btn-sm btn-danger',style:'padding:2px 6px;font-size:11px',onclick:()=>this.unblockCountry(cc)},'X'),
          ]));
        });
        list.appendChild(App.el('button',{className:'btn btn-sm btn-danger',style:'margin-top:8px;display:block',onclick:()=>this.clearGeoIP()},'Clear All'));
        el.appendChild(list);
      } else {
        el.appendChild(App.el('p',{className:'text-muted',style:'margin-top:8px'},'No countries blocked'));
      }
    }

    // ARP
    if (arp) {
      const el = document.getElementById('arp-info');
      el.replaceChildren();
      const bindings = arp.bindings||{};
      const alerts = arp.alerts||[];
      el.appendChild(App.el('div',{className:'info-grid'},[
        App.el('span',{className:'label'},'Known bindings'), App.el('span',{className:'value'},String(Object.keys(bindings).length)),
        App.el('span',{className:'label'},'Spoof alerts'), App.el('span',{className:'value '+(alerts.length>0?'text-red':'')},String(alerts.length)),
      ]));
      alerts.slice(-5).forEach(a => el.appendChild(App.el('div',{style:'margin-top:6px;padding:6px;background:rgba(248,81,73,0.1);border-radius:4px;font-size:12px'},a.description||'')));
    }

    // Rate limiting
    if (rl) {
      const el = document.getElementById('ratelimit-info');
      el.replaceChildren();
      el.appendChild(App.el('div',{className:'info-grid'},[
        App.el('span',{className:'label'},'Status'), App.el('span',{className:'value'},rl.active?'Active':'Inactive'),
      ]));
    }

    // Bandwidth
    if (bw&&bw.history&&bw.history.length>0) this.renderBandwidthChart(bw.history);
  },
  renderBandwidthChart(history) {
    const ctx = document.getElementById('chart-bw');
    if (!ctx) return;
    const ifaces = {};
    history.forEach(h => { if (h.interfaces) Object.entries(h.interfaces).forEach(([name,data]) => {
      if (!ifaces[name]) ifaces[name]={rx:[],tx:[]};
      ifaces[name].rx.push(data.rx_bps||0);
      ifaces[name].tx.push(data.tx_bps||0);
    });});
    const labels = history.map((_,i)=>i);
    const colors = [App.chartColors.blue,App.chartColors.green,App.chartColors.purple,App.chartColors.orange];
    const datasets = [];
    let ci = 0;
    Object.entries(ifaces).forEach(([name,data]) => {
      const c = colors[ci%colors.length];
      datasets.push({label:name+' RX',data:data.rx,borderColor:c,backgroundColor:c+'20',fill:true,tension:0.3,pointRadius:0});
      ci++;
    });
    const config = {type:'line',data:{labels,datasets},options:{...App.chartDefaults(),plugins:{legend:{labels:{color:App.chartColors.text,font:{size:11}}}}}};
    if (datasets.length===0) return;
    if (this.charts.bw) {this.charts.bw.data=config.data;this.charts.bw.update('none');}
    else {this.charts.bw=new Chart(ctx,config);}
  },
  async toggleFeeds(enable) { await App.api('POST','/api/security/feeds/toggle',{enabled:enable}); this.loadData(); },
  async updateFeeds() {
    document.getElementById('btn-update-feeds').textContent='Updating...';
    await App.api('POST','/api/security/feeds/update');
    document.getElementById('btn-update-feeds').textContent='Update Feeds Now';
    this.loadData();
  },
  async blockCountry() { const cc=document.getElementById('geo-cc').value.trim(); if(!cc)return; await App.api('POST','/api/security/geoip/block',{country:cc}); document.getElementById('geo-cc').value=''; this.loadData(); },
  async unblockCountry(cc) { await App.api('POST','/api/security/geoip/unblock',{country:cc}); this.loadData(); },
  async clearGeoIP() { if(!confirm('Remove all GeoIP blocks?'))return; await App.api('POST','/api/security/geoip/clear'); this.loadData(); },
};


// === ids.js ===
const IDS = {
  charts: {},
  _allAlerts: [],
  async render() {
    Object.values(this.charts||{}).forEach(c=>{try{c.destroy()}catch(e){}});this.charts={};
    App.showLoading('Loading...');
    const [status, alerts, sigs, sources] = await Promise.all([
      App.api('GET','/api/ids/status'),
      App.api('GET','/api/ids/alerts'),
      App.api('GET','/api/ids/signatures'),
      App.api('GET','/api/ids/sources'),
    ]);
    App.setPage(`
      <div class="page-header"><h2>Intrusion Detection (Suricata)</h2>
        <div><button class="btn btn-sm" id="ids-refresh">Refresh</button>
        <button class="btn btn-sm btn-primary" id="ids-update">Update Rules</button></div>
      </div>
      <div class="stats-grid" id="ids-overview"></div>
      <div class="charts-grid">
        <div class="chart-card"><h3>Top Signatures</h3><div style="height:300px"><canvas id="chart-sigs"></canvas></div></div>
        <div class="chart-card"><h3>Top Source IPs</h3><div style="height:300px"><canvas id="chart-sources"></canvas></div></div>
      </div>
      <div class="table-card"><h3>Alerts</h3>
        <div class="search-bar">
          <input type="text" id="ids-search" placeholder="Search by signature, IP, protocol...">
          <span class="search-count" id="ids-count"></span>
        </div>
        <div class="table-scroll">
          <table><thead><tr><th>Time</th><th>Sev</th><th>Signature</th><th>Source</th><th>Dest</th><th>Proto</th></tr></thead>
          <tbody id="tbl-ids-alerts"></tbody></table>
        </div>
      </div>`);
    document.getElementById('ids-refresh').addEventListener('click', () => this.loadData());
    document.getElementById('ids-update').addEventListener('click', () => this.updateRules());
    document.getElementById('ids-search').addEventListener('input', (e) => this._filterAlerts(e.target.value));
    this._renderData(status, alerts, sigs, sources);
    App.refreshTimer = setInterval(() => this.loadData(), 15000);
  },
  async loadData() {
    const [status, alerts, sigs, sources] = await Promise.all([
      App.api('GET','/api/ids/status'),
      App.api('GET','/api/ids/alerts'),
      App.api('GET','/api/ids/signatures'),
      App.api('GET','/api/ids/sources'),
    ]);
    this._renderData(status, alerts, sigs, sources);
  },
  _renderData(status, alerts, sigs, sources) {
    const ov = document.getElementById('ids-overview');
    if (!ov) return;
    ov.replaceChildren();
    [{l:'Suricata',v:status&&status.running?'RUNNING':'STOPPED',c:status&&status.running?'badge-green':'badge-red',badge:true},
     {l:'Rules Loaded',v:String(status?status.rules||0:0)},
     {l:'Total Alerts',v:String(status?status.alerts||0:0),cls:'text-orange'},
     {l:'Unique Signatures',v:String(sigs?sigs.signatures.length||0:0)},
    ].forEach(c => {
      const valEl = c.badge ? App.el('span',{className:'badge '+(c.c||'')},c.v) : App.el('div',{className:'stat-value '+(c.cls||'')},c.v);
      ov.appendChild(App.el('div',{className:'stat-card'},[App.el('div',{className:'stat-label'},c.l),valEl]));
    });

    if (alerts) {
      this._allAlerts = alerts.alerts || [];
      this._filterAlerts(document.getElementById('ids-search')?.value || '');
    }

    if (sigs&&sigs.signatures&&sigs.signatures.length>0) {
      const ctx = document.getElementById('chart-sigs');
      if (ctx) {
        const config = {type:'bar',data:{labels:sigs.signatures.map(s=>s.name.length>40?s.name.substring(0,37)+'...':s.name),datasets:[{data:sigs.signatures.map(s=>s.count),backgroundColor:App.chartColors.orange+'80',borderColor:App.chartColors.orange,borderWidth:1}]},options:{...App.chartDefaults(),indexAxis:'y',plugins:{legend:{display:false}}}};
        if (this.charts.sigs) {this.charts.sigs.data=config.data;this.charts.sigs.update('none');}
        else {this.charts.sigs=new Chart(ctx,config);}
      }
    }
    if (sources&&sources.sources&&sources.sources.length>0) {
      const ctx = document.getElementById('chart-sources');
      if (ctx) {
        const config = {type:'bar',data:{labels:sources.sources.map(s=>s.ip),datasets:[{data:sources.sources.map(s=>s.count),backgroundColor:App.chartColors.red+'80',borderColor:App.chartColors.red,borderWidth:1}]},options:{...App.chartDefaults(),plugins:{legend:{display:false}}}};
        if (this.charts.sources) {this.charts.sources.data=config.data;this.charts.sources.update('none');}
        else {this.charts.sources=new Chart(ctx,config);}
      }
    }
  },
  _filterAlerts(query) {
    const tbody = document.getElementById('tbl-ids-alerts');
    const countEl = document.getElementById('ids-count');
    if (!tbody) return;
    tbody.replaceChildren();
    const q = query.toLowerCase();
    const sevMap = {1:'critical',2:'high',3:'medium'};
    const filtered = q ? this._allAlerts.filter(a => {
      return (a.signature||'').toLowerCase().includes(q) ||
             (a.src_ip||'').includes(q) ||
             (a.dest_ip||'').includes(q) ||
             (a.protocol||'').toLowerCase().includes(q) ||
             (a.category||'').toLowerCase().includes(q) ||
             (sevMap[a.severity]||'').includes(q);
    }) : this._allAlerts;

    if (countEl) countEl.textContent = filtered.length + ' of ' + this._allAlerts.length;

    if (filtered.length === 0) {
      tbody.appendChild(App.el('tr',{},[App.el('td',{colspan:'6',className:'text-muted'},q?'No matches':'No alerts — network is clean')]));
    } else {
      filtered.forEach(a => {
        tbody.appendChild(App.el('tr',{},[
          App.el('td',{style:'font-size:12px'},a.timestamp||''),
          App.el('td',{},[App.badgeEl(sevMap[a.severity]||'low')]),
          App.el('td',{style:'font-size:12px'},(a.signature||'').substring(0,60)),
          App.el('td',{},[App.el('code',{},a.src_ip||'')]),
          App.el('td',{},[App.el('code',{},a.dest_ip+':'+a.dest_port)]),
          App.el('td',{className:'text-muted'},a.protocol||''),
        ]));
      });
    }
  },
  async updateRules() {
    document.getElementById('ids-update').textContent='Updating...';
    await App.api('POST','/api/ids/update-rules');
    document.getElementById('ids-update').textContent='Update Rules';
    this.loadData();
  },
};


// === settings.js ===
const Settings = {
  async render() {
    App.showLoading('Loading Settings...');
    const [tfa, notif, report] = await Promise.all([
      App.api('GET','/api/settings/2fa'),
      App.api('GET','/api/settings/notifications'),
      App.api('GET','/api/settings/report'),
    ]);
    App.setPage(`
      <div class="page-header"><h2>Settings</h2></div>
      <div class="charts-grid">
        <div class="table-card">
          <h3>Two-Factor Authentication</h3>
          <div id="tfa-section"></div>
        </div>
        <div class="table-card">
          <h3>Change Password</h3>
          <div class="form-group" style="margin-bottom:10px">
            <input type="password" id="pw-current" placeholder="Current password" style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-primary);width:100%;margin-bottom:8px">
            <input type="password" id="pw-new" placeholder="New password" style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-primary);width:100%;margin-bottom:8px">
            <button class="btn btn-primary btn-sm" id="btn-pw-change">Change Password</button>
            <span id="pw-msg" style="margin-left:10px;font-size:13px"></span>
          </div>
        </div>
      </div>
      <div class="table-card">
        <h3>Alert Notifications</h3>
        <div id="notif-section"></div>
      </div>
      <div class="table-card">
        <h3>Daily Security Report</h3>
        <div id="report-section"></div>
        <button class="btn btn-sm btn-primary" id="btn-gen-report" style="margin-top:12px">Generate Report Now</button>
      </div>`);

    document.getElementById('btn-pw-change').addEventListener('click', () => this.changePassword());
    document.getElementById('btn-gen-report').addEventListener('click', () => this.generateReport());

    this._render2FA(tfa);
    this._renderNotifications(notif);
    this._renderReport(report);
  },

  _render2FA(tfa) {
    const el = document.getElementById('tfa-section');
    if (!el) return;
    el.replaceChildren();

    if (tfa && tfa.enabled) {
      el.appendChild(App.el('div',{style:'display:flex;align-items:center;gap:10px'},[
        App.el('span',{className:'badge badge-green'},'ENABLED'),
        App.el('button',{className:'btn btn-sm btn-danger',onclick:()=>this.disable2FA()},'Disable 2FA'),
      ]));
    } else {
      el.appendChild(App.el('div',{},[
        App.el('span',{className:'badge badge-red',style:'margin-bottom:12px;display:inline-block'},'DISABLED'),
        App.el('div',{style:'margin-top:8px'},[
          App.el('button',{className:'btn btn-sm btn-primary',onclick:()=>this.setup2FA()},'Enable 2FA'),
        ]),
      ]));
    }
  },

  async setup2FA() {
    const data = await App.api('POST','/api/settings/2fa/setup');
    if (!data) return;
    const el = document.getElementById('tfa-section');
    el.replaceChildren();
    el.appendChild(App.el('div',{},[
      App.el('p',{style:'font-size:13px;margin-bottom:8px'},'Add this to your authenticator app:'),
      App.el('code',{style:'display:block;padding:10px;background:var(--bg-primary);border-radius:4px;font-size:12px;word-break:break-all;margin-bottom:12px'},data.secret),
      App.el('p',{style:'font-size:12px;color:var(--text-muted);margin-bottom:8px'},'Or scan: '+data.uri),
      App.el('input',{type:'text',id:'tfa-code',placeholder:'Enter 6-digit code',style:'background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-primary);width:150px;margin-right:8px'}),
      App.el('button',{className:'btn btn-sm btn-primary',onclick:()=>this.confirm2FA(data.secret)},'Verify & Enable'),
      App.el('span',{id:'tfa-msg',style:'margin-left:10px;font-size:13px'}),
    ]));
  },

  async confirm2FA(secret) {
    const code = document.getElementById('tfa-code').value.trim();
    if (!code) return;
    const result = await App.api('POST','/api/settings/2fa/confirm',{code,secret});
    const msg = document.getElementById('tfa-msg');
    if (result && result.success) {
      msg.textContent = 'Enabled!';
      msg.style.color = 'var(--accent-green)';
      setTimeout(() => this.render(), 1000);
    } else {
      msg.textContent = result ? result.error : 'Failed';
      msg.style.color = 'var(--accent-red)';
    }
  },

  async disable2FA() {
    if (!confirm('Disable 2FA?')) return;
    await App.api('POST','/api/settings/2fa/disable');
    this.render();
  },

  async changePassword() {
    const current = document.getElementById('pw-current').value;
    const newPw = document.getElementById('pw-new').value;
    const msg = document.getElementById('pw-msg');
    if (!current || !newPw) return;
    const result = await App.api('POST','/api/settings/password',{current,new_password:newPw});
    if (result && result.success) {
      msg.textContent = 'Password changed!';
      msg.style.color = 'var(--accent-green)';
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value = '';
    } else {
      msg.textContent = result ? result.error : 'Failed';
      msg.style.color = 'var(--accent-red)';
    }
  },

  _renderNotifications(notif) {
    const el = document.getElementById('notif-section');
    if (!el) return;
    el.replaceChildren();
    const conf = notif || {enabled:false,min_severity:'high',webhook:{enabled:false,url:''},telegram:{enabled:false,bot_token:'',chat_id:''},discord:{enabled:false,webhook_url:''}};

    const mkInput = (id, val, placeholder) => {
      const inp = App.el('input',{type:'text',id:id,placeholder:placeholder,style:'background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text-primary);width:100%;margin-bottom:6px;font-size:13px'});
      inp.value = val || '';
      return inp;
    };

    const form = App.el('div',{style:'font-size:13px'},[
      App.el('div',{style:'margin-bottom:12px'},[
        App.el('label',{style:'display:flex;align-items:center;gap:6px;cursor:pointer'},[
          Object.assign(App.el('input',{type:'checkbox',id:'notif-enabled'}),{checked:conf.enabled}),
          document.createTextNode('Enable notifications'),
        ]),
        App.el('div',{style:'margin-top:6px'},[
          App.el('span',{className:'text-muted'},'Min severity: '),
          Object.assign(App.el('select',{id:'notif-severity',style:'background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);padding:4px;border-radius:4px'})
          ,{innerHTML:'<option value="critical">Critical</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>'}),
        ]),
      ]),
      App.el('div',{style:'margin-bottom:12px;padding:12px;background:var(--bg-primary);border-radius:4px'},[
        App.el('div',{style:'font-weight:600;margin-bottom:6px'},'Webhook'),
        Object.assign(App.el('input',{type:'checkbox',id:'notif-wh-enabled'}),{checked:conf.webhook?.enabled}),
        document.createTextNode(' Enabled'),
        App.el('br'),
        mkInput('notif-wh-url', conf.webhook?.url, 'https://your-webhook-url.com/hook'),
      ]),
      App.el('div',{style:'margin-bottom:12px;padding:12px;background:var(--bg-primary);border-radius:4px'},[
        App.el('div',{style:'font-weight:600;margin-bottom:6px'},'Telegram'),
        Object.assign(App.el('input',{type:'checkbox',id:'notif-tg-enabled'}),{checked:conf.telegram?.enabled}),
        document.createTextNode(' Enabled'),
        App.el('br'),
        mkInput('notif-tg-token', conf.telegram?.bot_token, 'Bot token'),
        mkInput('notif-tg-chat', conf.telegram?.chat_id, 'Chat ID'),
      ]),
      App.el('div',{style:'margin-bottom:12px;padding:12px;background:var(--bg-primary);border-radius:4px'},[
        App.el('div',{style:'font-weight:600;margin-bottom:6px'},'Discord'),
        Object.assign(App.el('input',{type:'checkbox',id:'notif-dc-enabled'}),{checked:conf.discord?.enabled}),
        document.createTextNode(' Enabled'),
        App.el('br'),
        mkInput('notif-dc-url', conf.discord?.webhook_url, 'Discord webhook URL'),
      ]),
      App.el('button',{className:'btn btn-sm btn-primary',onclick:()=>this.saveNotifications()},'Save Notifications'),
      App.el('span',{id:'notif-msg',style:'margin-left:10px;font-size:13px'}),
    ]);
    el.appendChild(form);
    // Set severity dropdown
    setTimeout(() => {
      const sel = document.getElementById('notif-severity');
      if (sel) sel.value = conf.min_severity || 'high';
    }, 0);
  },

  async saveNotifications() {
    const config = {
      enabled: document.getElementById('notif-enabled').checked,
      min_severity: document.getElementById('notif-severity').value,
      webhook: {
        enabled: document.getElementById('notif-wh-enabled').checked,
        url: document.getElementById('notif-wh-url').value,
      },
      telegram: {
        enabled: document.getElementById('notif-tg-enabled').checked,
        bot_token: document.getElementById('notif-tg-token').value,
        chat_id: document.getElementById('notif-tg-chat').value,
      },
      discord: {
        enabled: document.getElementById('notif-dc-enabled').checked,
        webhook_url: document.getElementById('notif-dc-url').value,
      },
    };
    const result = await App.api('POST','/api/settings/notifications',config);
    const msg = document.getElementById('notif-msg');
    if (result && result.success) {
      msg.textContent = 'Saved!';
      msg.style.color = 'var(--accent-green)';
    } else {
      msg.textContent = 'Failed';
      msg.style.color = 'var(--accent-red)';
    }
  },

  _renderReport(report) {
    const el = document.getElementById('report-section');
    if (!el) return;
    el.replaceChildren();
    if (!report || !report.summary || report.summary === 'No reports generated yet') {
      el.appendChild(App.el('p',{className:'text-muted'},'No reports generated yet. Click below to generate one.'));
      return;
    }
    const s = report.summary;
    el.appendChild(App.el('div',{className:'info-grid'},[
      App.el('span',{className:'label'},'Period'), App.el('span',{className:'value'},report.period||''),
      App.el('span',{className:'label'},'Generated'), App.el('span',{className:'value'},report.generated_at||''),
      App.el('span',{className:'label'},'Total Threats'), App.el('span',{className:'value'},String(s.total_threats||0)),
      App.el('span',{className:'label'},'Unique IPs'), App.el('span',{className:'value'},String(s.unique_source_ips||0)),
      App.el('span',{className:'label'},'IPs Blocked'), App.el('span',{className:'value'},String(s.ips_blocked||0)),
      App.el('span',{className:'label'},'Suricata Alerts'), App.el('span',{className:'value'},String(s.suricata_alerts||0)),
    ]));
    if (report.ai_analysis && report.ai_analysis.summary) {
      el.appendChild(App.el('div',{style:'margin-top:12px;padding:10px;background:var(--bg-primary);border-radius:4px'},[
        App.el('div',{style:'font-weight:600;margin-bottom:4px;color:var(--accent-purple)'},'Claude Analysis'),
        App.el('p',{style:'font-size:13px'},report.ai_analysis.summary),
      ]));
    }
  },

  async generateReport() {
    document.getElementById('btn-gen-report').textContent = 'Generating...';
    const report = await App.api('POST','/api/settings/report/generate');
    document.getElementById('btn-gen-report').textContent = 'Generate Report Now';
    if (report) this._renderReport(report);
  },
};
