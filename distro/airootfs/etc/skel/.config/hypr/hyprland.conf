# ============================================================
# Cerberix Linux — Hyprland Configuration
# ============================================================

# ── Monitors ─────────────────────────────────────────────
monitor=,preferred,auto,1

# ── Autostart ────────────────────────────────────────────
exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Environment ──────────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = GTK_THEME,Cerberix-Dark
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ── Input ────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ── General ──────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(58a6ffee) rgba(7ee787ee) 45deg
    col.inactive_border = rgba(30363daa)
    layout = dwindle
    allow_tearing = false
}

# ── Decoration ───────────────────────────────────────────
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        vibrancy = 0.2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0d1117ee)
    }
}

# ── Animations ───────────────────────────────────────────
animations {
    enabled = true
    bezier = cerberix, 0.05, 0.9, 0.1, 1.05
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56

    animation = windows, 1, 5, cerberix
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 5, smoothIn
    animation = workspaces, 1, 5, cerberix, slide
}

# ── Layouts ──────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

# ── Misc ─────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ── Window Rules ─────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(thunar)$,title:^(File Operation)$
windowrulev2 = float, class:^(firefox)$,title:^(Library)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(org.keepassxc.KeePassXC)$
windowrulev2 = opacity 0.92, class:^(kitty)$
windowrulev2 = opacity 0.95, class:^(code)$
windowrulev2 = opacity 0.95, class:^(thunar)$

# ── Keybinds ─────────────────────────────────────────────
$mod = SUPER

# Core
bind = $mod, Return, exec, kitty
bind = $mod, B, exec, firefox
bind = $mod, E, exec, thunar
bind = $mod, Space, exec, wofi --show drun
bind = $mod, V, exec, cliphist list | wofi --show dmenu | cliphist decode | wl-copy
bind = $mod, L, exec, hyprlock
bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exit
bind = $mod, F, fullscreen
bind = $mod SHIFT, F, togglefloating
bind = $mod, P, pseudo
bind = $mod, S, togglesplit

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mod, Print, exec, grim - | swappy -f -
bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

# Move focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Resize mode
bind = $mod, R, submap, resize
submap = resize
binde = , right, resizeactive, 20 0
binde = , left, resizeactive, -20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20
bind = , escape, submap, reset
submap = reset

# Volume
binde = , XF86AudioRaiseVolume, exec, pamixer -i 5
binde = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t

# Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Cerberix shortcuts
bind = $mod, C, exec, kitty --class cerberix-connect -e cerberix-connect
bind = $mod SHIFT, S, exec, cerberix-shield-toggle
