# Cerberix Linux — Lock Screen

general {
    hide_cursor = true
    grace = 3
}

background {
    monitor =
    path = /usr/share/cerberix/wallpaper.png
    blur_passes = 3
    blur_size = 8
    brightness = 0.4
}

label {
    monitor =
    text = Cerberix Linux
    color = rgba(230, 237, 243, 0.9)
    font_size = 32
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(88, 166, 255, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %B %d')"
    color = rgba(139, 148, 158, 0.8)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 10
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgba(48, 54, 61, 0.8)
    inner_color = rgba(33, 38, 45, 0.9)
    font_color = rgb(230, 237, 243)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgb(88, 166, 255)
    fail_color = rgb(248, 81, 73)
    fail_text = <i>Incorrect</i>
    position = 0, -100
    halign = center
    valign = center
    rounding = 10
}
