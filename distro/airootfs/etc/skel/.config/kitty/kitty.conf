# Cerberix Linux — Kitty Terminal Configuration

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Cursor
cursor_shape     beam
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000

# Window
window_padding_width 8 12
background_opacity 0.92
dynamic_background_opacity yes
confirm_os_window_close 0

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold

# ── Cerberix Dark Theme ──────────────────────────────────
foreground           #e6edf3
background           #0d1117
selection_foreground #0d1117
selection_background #58a6ff
cursor               #58a6ff
cursor_text_color    #0d1117
url_color            #58a6ff

# Black
color0  #0d1117
color8  #484f58

# Red
color1  #f85149
color9  #ff7b72

# Green
color2  #3fb950
color10 #7ee787

# Yellow
color3  #d29922
color11 #e3b341

# Blue
color4  #58a6ff
color12 #79c0ff

# Magenta
color5  #bc8cff
color13 #d2a8ff

# Cyan
color6  #39d2c0
color14 #56d4dd

# White
color7  #8b949e
color15 #e6edf3

# Tab colors
active_tab_foreground   #e6edf3
active_tab_background   #161b22
inactive_tab_foreground #8b949e
inactive_tab_background #0d1117
tab_bar_background      #010409
