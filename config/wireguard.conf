# ============================================================
# Cerberix Firewall — WireGuard VPN Configuration
# ============================================================
# This is a template. Actual runtime config is generated by
# cerberix-wg with keys from /etc/cerberix/wireguard/
# ============================================================

# ── Defaults (overridable via CERBERIX_WG_* env vars) ───────
WG_ENABLED="true"
WG_INTERFACE="wg0"
WG_PORT="51820"
WG_SUBNET="10.100.0.0/24"
WG_SERVER_IP="10.100.0.1"

# DNS pushed to VPN clients (VPN gateway IP)
WG_DNS="10.100.0.1"

# Allow VPN clients to reach the LAN
WG_ROUTE_LAN="true"

# Allow VPN clients to route all traffic through the gateway
WG_ROUTE_ALL="false"

# Max peers (clients)
WG_MAX_PEERS="10"

# Persistent keepalive for NAT traversal (seconds, 0 = disabled)
WG_KEEPALIVE="25"
