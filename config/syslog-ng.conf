# ============================================================
# Cerberix Firewall — syslog-ng Configuration
# Lightweight structured logging + remote syslog receiver
# ============================================================

@version: 4.4

options {
    chain_hostnames(off);
    flush_lines(0);
    use_dns(no);
    use_fqdn(no);
    dns_cache(no);
    keep_hostname(yes);
    create_dirs(yes);
    perm(0640);
    dir_perm(0750);
    stats(freq(0));
};

# ── Local Sources ─────────────────────────────────────────
source s_sys {
    unix-dgram("/dev/log");
    internal();
};

# ── Remote Syslog Receiver (aggregated from other servers) ─
# Receives logs from mail servers, web servers, etc.
# Servers send logs with: *.* @CERBERIX_IP:514
source s_remote {
    udp(ip("0.0.0.0") port(514));
    tcp(ip("0.0.0.0") port(514));
};

# ── Destinations ────────────────────────────────────────────
destination d_cerberix {
    file("/var/log/cerberix/cerberix.log"
        template("${ISODATE} ${HOST} ${MSGHDR}${MSG}\n")
    );
};

destination d_firewall {
    file("/var/log/cerberix/firewall.log"
        template("${ISODATE} ${MSGHDR}${MSG}\n")
    );
};

destination d_auth {
    file("/var/log/cerberix/auth.log"
        template("${ISODATE} ${HOST} ${MSGHDR}${MSG}\n")
    );
};

# Remote host logs — all go to one file for fail2ban to watch
destination d_remote {
    file("/var/log/cerberix/hosts/remote.log"
        template("${ISODATE} ${HOST} ${MSGHDR}${MSG}\n")
    );
};

# Per-host logs for detailed analysis
destination d_remote_per_host {
    file("/var/log/cerberix/hosts/${HOST}.log"
        template("${ISODATE} ${MSGHDR}${MSG}\n")
    );
};

# ── Filters ─────────────────────────────────────────────────
filter f_firewall {
    match("CERBERIX" value("MSG"));
};

filter f_auth {
    facility(auth, authpriv);
};

filter f_not_firewall {
    not match("CERBERIX" value("MSG"));
};

# ── Log paths — Local ──────────────────────────────────────
log {
    source(s_sys);
    filter(f_firewall);
    destination(d_firewall);
};

log {
    source(s_sys);
    filter(f_auth);
    destination(d_auth);
};

log {
    source(s_sys);
    filter(f_not_firewall);
    destination(d_cerberix);
};

# ── Log paths — Remote hosts ──────────────────────────────
# All remote logs go to both the combined file and per-host files
log {
    source(s_remote);
    destination(d_remote);
    destination(d_remote_per_host);
};

# Remote auth logs also go to auth.log
log {
    source(s_remote);
    filter(f_auth);
    destination(d_auth);
};
