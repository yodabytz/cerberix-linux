# ============================================================
# Cerberix Firewall — Main Configuration
# ============================================================
# This file defines system-wide defaults. Environment variables
# override these values at runtime.
# ============================================================

# ── Interface Roles ─────────────────────────────────────────
WAN_IF="eth0"
LAN_IF="eth1"

# ── LAN Network ─────────────────────────────────────────────
LAN_SUBNET="192.168.1.0/24"
LAN_IP="192.168.1.1"
LAN_NETMASK="255.255.255.0"

# ── DHCP ────────────────────────────────────────────────────
DHCP_RANGE_START="192.168.1.100"
DHCP_RANGE_END="192.168.1.200"
DHCP_LEASE="12h"
DHCP_DOMAIN="cerberix.local"

# ── DNS ─────────────────────────────────────────────────────
DNS_UPSTREAM="1.1.1.1,1.0.0.1"
DNS_CACHE_SIZE="1000"

# ── Logging ─────────────────────────────────────────────────
LOG_LEVEL="info"
LOG_DIR="/var/log/cerberix"

# ── Security ────────────────────────────────────────────────
# Drop invalid packets
DROP_INVALID="yes"
# Log dropped packets (rate-limited)
LOG_DROPPED="yes"
# Enable SYN flood protection
SYN_FLOOD_PROTECTION="yes"
