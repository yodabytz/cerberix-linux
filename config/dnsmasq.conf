# ============================================================
# Cerberix Firewall — dnsmasq Configuration
# DHCP Server + DNS Forwarder/Cache
# ============================================================

# ── General ─────────────────────────────────────────────────
# Run as background daemon (must NOT use keep-in-foreground so init.sh continues)
# Daemon mode is the default
# User/group (dropped privileges)
user=nobody
group=nobody

# Do not read /etc/resolv.conf — use explicit upstream servers
no-resolv
# Do not poll resolv.conf for changes
no-poll

# ── DNS ─────────────────────────────────────────────────────
# Upstream DNS servers (Cloudflare)
server=1.1.1.1
server=1.0.0.1

# Cache size (number of DNS entries)
cache-size=1000

# Never forward plain names (without a dot)
domain-needed
# Never forward addresses in non-routed address spaces
bogus-priv

# Local domain
domain=cerberix.local
local=/cerberix.local/

# Listen only on LAN interface and localhost
listen-address=192.168.1.1
listen-address=127.0.0.1
bind-interfaces

# DNS port
port=53

# ── DHCP ────────────────────────────────────────────────────
# DHCP range: .100 to .200, 12-hour lease
dhcp-range=192.168.1.100,192.168.1.200,255.255.255.0,12h

# Default gateway (this firewall)
dhcp-option=option:router,192.168.1.1
# DNS server (this firewall)
dhcp-option=option:dns-server,192.168.1.1
# Domain name
dhcp-option=option:domain-name,cerberix.local
# NTP server (this firewall)
dhcp-option=option:ntp-server,192.168.1.1

# Authoritative DHCP (only DHCP server on this segment)
dhcp-authoritative

# Lease file
dhcp-leasefile=/var/lib/cerberix/dnsmasq.leases

# ── Logging ─────────────────────────────────────────────────
# Log DNS queries (disable in production for performance)
# log-queries
# Log DHCP transactions
log-dhcp
log-facility=/var/log/cerberix/dnsmasq.log

# ── Security ────────────────────────────────────────────────
# Ignore /etc/hosts
no-hosts
# Add local hosts here if needed
# address=/gateway.cerberix.local/192.168.1.1

# ── Drop-in config directory ───────────────────────────────
conf-dir=/etc/cerberix/dnsmasq.d/,*.conf
