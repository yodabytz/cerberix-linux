#!/usr/sbin/nft -f
# ============================================================
# Cerberix Firewall — nftables Firewall Configuration
# ============================================================
# Policy: Default DENY inbound, ALLOW outbound, ALLOW forwarding
#         LAN→WAN with NAT (MASQUERADE)
# ============================================================

# Flush existing ruleset
flush ruleset

# ── Variables (overridden by init script via defines) ───────
define WAN_IF  = "eth0"
define LAN_IF  = "eth1"
define LAN_NET = 192.168.1.0/24

# ============================================================
# inet filter — combined IPv4/IPv6 filter table
# ============================================================
table inet filter {

    # ── INPUT chain (traffic TO the firewall) ───────────────
    chain input {
        type filter hook input priority 0; policy drop;

        # Drop all IPv6 — not needed, reduces attack surface
        meta nfproto ipv6 drop

        # Allow established/related connections
        ct state established,related accept

        # Drop invalid packets
        ct state invalid drop

        # Allow loopback
        iif "lo" accept

        # Allow ICMP (ping) — rate-limited
        ip protocol icmp icmp type {
            echo-request,
            echo-reply,
            destination-unreachable,
            time-exceeded
        } limit rate 10/second accept

        # Allow DNS from LAN only
        iifname $LAN_IF udp dport 53 accept
        iifname $LAN_IF tcp dport 53 accept

        # Allow DHCP from LAN only
        iifname $LAN_IF udp dport { 67, 68 } accept

        # Allow SSH from LAN only (for management)
        iifname $LAN_IF tcp dport 22 accept

        # Allow Web UI from LAN only
        iifname $LAN_IF tcp dport 8443 accept

        # Allow syslog from LAN (remote log aggregation)
        iifname $LAN_IF udp dport 514 accept
        iifname $LAN_IF tcp dport 514 accept

        # Allow NTP from LAN
        iifname $LAN_IF udp dport 123 accept

        # Log and drop everything else (rate-limited)
        limit rate 5/minute log prefix "[CERBERIX DROP IN] " level warn
        drop
    }

    # ── FORWARD chain (traffic THROUGH the firewall) ────────
    chain forward {
        type filter hook forward priority 0; policy drop;

        # Drop all IPv6
        meta nfproto ipv6 drop

        # Allow established/related
        ct state established,related accept

        # Drop invalid
        ct state invalid drop

        # Allow LAN → WAN (outbound)
        iifname $LAN_IF oifname $WAN_IF accept

        # Allow WAN → LAN for port-forwarded services
        iifname $WAN_IF oifname $LAN_IF ip daddr 192.168.1.10 tcp dport { 80, 443 } accept
        iifname $WAN_IF oifname $LAN_IF ip daddr 192.168.1.20 tcp dport { 25, 587, 143, 993 } accept

        # Log dropped forwards
        limit rate 5/minute log prefix "[CERBERIX DROP FWD] " level warn
        drop
    }

    # ── OUTPUT chain (traffic FROM the firewall) ────────────
    chain output {
        type filter hook output priority 0; policy accept;

        # Firewall itself can reach anything
        # (DNS resolution, updates, NTP, etc.)
    }
}

# ============================================================
# ip nat — NAT table (IPv4 only)
# ============================================================
table ip nat {

    # ── POSTROUTING — MASQUERADE LAN behind WAN IP ─────────
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # NAT all LAN traffic going out WAN
        oifname $WAN_IF ip saddr $LAN_NET masquerade
    }

    # ── PREROUTING — Port forwarding (future use) ──────────
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;

        # Example (disabled):
        # iifname $WAN_IF tcp dport 8080 dnat to 192.168.1.10:80
    }
}

# ============================================================
# Include drop-in rule fragments
# ============================================================
include "/etc/cerberix/nftables.d/*.nft"
