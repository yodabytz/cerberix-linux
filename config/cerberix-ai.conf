# ============================================================
# Cerberix Firewall — AI Threat Engine Configuration
# ============================================================
# All values overridable via CERBERIX_AI_* environment variables
# ============================================================

# ── Claude API ──────────────────────────────────────────────
# Set CERBERIX_AI_API_KEY in environment (not in this file)
# Model for deep analysis
AI_MODEL="claude-sonnet-4-6"
# Enable/disable AI engine entirely
AI_ENABLED="true"

# ── Detection Thresholds ────────────────────────────────────
# Port scan: N distinct ports from one IP in time window
AI_PORTSCAN_THRESHOLD="15"
AI_PORTSCAN_WINDOW="60"

# Brute force: N blocked connections to same port from one IP
AI_BRUTEFORCE_THRESHOLD="10"
AI_BRUTEFORCE_WINDOW="120"

# DGA: Shannon entropy threshold for domain suspicion
AI_DGA_ENTROPY="3.5"

# Traffic anomaly: standard deviations from baseline
AI_ANOMALY_STD="3.0"

# ── Auto-Response ───────────────────────────────────────────
# Automatically block IPs that trigger high/critical alerts
AI_AUTO_BLOCK="true"
# Duration of auto-blocks in seconds (0 = permanent)
AI_BLOCK_DURATION="3600"

# ── Analysis Intervals ─────────────────────────────────────
# How often to collect traffic snapshots (seconds)
AI_INTERVAL="30"
# How often to run Claude deep analysis (seconds)
AI_DEEP_INTERVAL="300"
# Max events to buffer before forced processing
AI_MAX_BUFFER="1000"
